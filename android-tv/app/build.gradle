apply plugin: 'com.android.application'

android {
    namespace 'com.lantapilates.tv'
    compileSdk 35

    defaultConfig {
        applicationId 'com.lantapilates.tv'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // No AppCompat — keeps the TV APK free of Kotlin stdlib clashes.
}
